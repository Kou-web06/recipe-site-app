steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/recipe-frontend:$BUILD_ID
      - --build-arg
      - NEXT_PUBLIC_API_URL=$_NEXT_PUBLIC_API_URL
      - .
    dir: frontend

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/recipe-frontend:$BUILD_ID

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - recipe-frontend
      - --image=gcr.io/$PROJECT_ID/recipe-frontend:$BUILD_ID
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --set-env-vars=NEXT_PUBLIC_API_URL=$_NEXT_PUBLIC_API_URL

images:
  - gcr.io/$PROJECT_ID/recipe-frontend:$BUILD_ID

substitutions:
  _REGION: asia-northeast1
  _NEXT_PUBLIC_API_URL: https://recipe-backend-260406080055.asia-northeast1.run.app
