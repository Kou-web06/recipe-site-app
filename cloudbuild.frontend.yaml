steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/recipe-frontend:$COMMIT_SHA
      - --build-arg
      - NEXT_PUBLIC_API_URL=$_BACKEND_URL
      - .
    dir: frontend

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/recipe-frontend:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - recipe-frontend
      - --image=gcr.io/$PROJECT_ID/recipe-frontend:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --set-env-vars=NEXT_PUBLIC_API_URL=$_BACKEND_URL

images:
  - gcr.io/$PROJECT_ID/recipe-frontend:$COMMIT_SHA

substitutions:
  _REGION: asia-northeast1
  _BACKEND_URL: https://backend-260406080055.asia-northeast1.run.app
