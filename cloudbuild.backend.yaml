steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/recipe-backend:$COMMIT_SHA
      - .
    dir: backend

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/recipe-backend:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - recipe-backend
      - --image=gcr.io/$PROJECT_ID/recipe-backend:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080

images:
  - gcr.io/$PROJECT_ID/recipe-backend:$COMMIT_SHA

substitutions:
  _REGION: asia-northeast1
